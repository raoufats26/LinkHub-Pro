<!DOCTYPE html>
<html lang="en" data-theme="{{ user.theme or 'light' }}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ user.username }}{% if user.bio %} — {{ user.bio[:55] }}{% endif %}</title>
  <meta name="description" content="{{ user.bio or (user.username + ' on LinkHub Pro') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ══ THEMES ══ */
    :root, [data-theme="light"] {
      --bg:           #faf9f7;
      --bg-card:      #fff;
      --border:       #e8e4dd;
      --text:         #18160f;
      --text-2:       #4a4640;
      --text-3:       #9a9590;
      --accent:       #f97316;
      --accent-soft:  rgba(249,115,22,.09);
      --link-bg:      #fff;
      --link-border:  #e8e4dd;
      --link-hover-bg:#fffaf6;
      --link-hover-bd:#f97316;
      --shadow:       0 2px 12px rgba(0,0,0,.06);
      --shadow-hover: 0 6px 24px rgba(249,115,22,.12);
    }
    [data-theme="dark"] {
      --bg:           #111010;
      --bg-card:      #1a1917;
      --border:       #2c2a27;
      --text:         #f0ede8;
      --text-2:       #a8a39c;
      --text-3:       #6b6660;
      --accent:       #f97316;
      --accent-soft:  rgba(249,115,22,.12);
      --link-bg:      #1e1c1a;
      --link-border:  #2c2a27;
      --link-hover-bg:#231f1c;
      --link-hover-bd:#f97316;
      --shadow:       0 2px 12px rgba(0,0,0,.4);
      --shadow-hover: 0 6px 24px rgba(249,115,22,.10);
    }
    [data-theme="neon"] {
      --bg:           #050507;
      --bg-card:      #0d0d10;
      --border:       #1e1e28;
      --text:         #e8e8f0;
      --text-2:       #8080a0;
      --text-3:       #50506a;
      --accent:       #a78bfa;
      --accent-soft:  rgba(167,139,250,.10);
      --link-bg:      #0f0f14;
      --link-border:  #1e1e28;
      --link-hover-bg:#13131a;
      --link-hover-bd:#a78bfa;
      --shadow:       0 2px 16px rgba(0,0,0,.5);
      --shadow-hover: 0 6px 28px rgba(167,139,250,.15);
    }
    [data-theme="professional"] {
      --bg:           #f8fafc;
      --bg-card:      #fff;
      --border:       #e2e8f0;
      --text:         #0f172a;
      --text-2:       #475569;
      --text-3:       #94a3b8;
      --accent:       #0ea5e9;
      --accent-soft:  rgba(14,165,233,.08);
      --link-bg:      #fff;
      --link-border:  #e2e8f0;
      --link-hover-bg:#f0f9ff;
      --link-hover-bd:#0ea5e9;
      --shadow:       0 2px 10px rgba(0,0,0,.05);
      --shadow-hover: 0 6px 20px rgba(14,165,233,.12);
    }

    /* ══ BASE ══ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Geist', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }

    /* neon gradient bg */
    [data-theme="neon"] body {
      background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(167,139,250,.06), transparent), #050507;
    }

    /* ══ PAGE ══ */
    .page {
      width: 100%; max-width: 480px;
      padding: 64px 24px 80px;
      display: flex; flex-direction: column; align-items: center;
    }

    /* ══ AVATAR ══ */
    .avatar-wrap { margin-bottom: 20px; }
    .avatar-img {
      width: 88px; height: 88px; border-radius: 50%;
      border: 2px solid var(--border); object-fit: cover;
      box-shadow: var(--shadow);
    }
    .avatar-init {
      width: 88px; height: 88px; border-radius: 50%;
      background: var(--accent-soft); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Instrument Serif', serif; font-size: 34px; color: var(--accent);
    }

    /* ══ HEADER ══ */
    .username {
      font-family: 'Instrument Serif', serif;
      font-size: 28px; letter-spacing: -.02em;
      color: var(--text); margin-bottom: 7px; text-align: center;
    }
    .bio {
      font-size: 14px; color: var(--text-3); line-height: 1.65;
      text-align: center; max-width: 320px; margin-bottom: 36px;
    }

    /* ══ LINKS ══ */
    .links { width: 100%; display: flex; flex-direction: column; gap: 10px; }

    .link-btn {
      display: block; width: 100%;
      padding: 15px 22px;
      background: var(--link-bg); color: var(--text);
      border: 1.5px solid var(--link-border); border-radius: 12px;
      font-family: 'Geist', sans-serif; font-size: 14px; font-weight: 500;
      text-align: center; text-decoration: none;
      box-shadow: var(--shadow);
      transition: border-color .18s, background .18s, box-shadow .18s, transform .18s;
    }
    .link-btn:hover {
      border-color: var(--link-hover-bd);
      background: var(--link-hover-bg);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
      color: var(--text);
      opacity: 1;
    }

    /* ══ FOOTER ══ */
    .footer {
      margin-top: 52px; text-align: center;
      font-size: 12px; color: var(--text-3);
    }
    .footer a { color: var(--accent); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="page">

    <div class="avatar-wrap">
      {% if user.avatar %}
        <img src="/static/{{ user.avatar }}" class="avatar-img" alt="{{ user.username }}">
      {% else %}
        <div class="avatar-init">{{ user.username[0]|upper }}</div>
      {% endif %}
    </div>

    <h1 class="username">{{ user.username }}</h1>

    {% if user.bio %}
      <p class="bio">{{ user.bio }}</p>
    {% else %}
      <div style="margin-bottom:36px;"></div>
    {% endif %}

    <div class="links">
      {% for link in links %}
        <a href="/go/{{ link.id }}" class="link-btn">{{ link.title }}</a>
      {% else %}
        <p style="text-align:center; color:var(--text-3); font-size:14px; padding:32px 0;">
          No links added yet.
        </p>
      {% endfor %}
    </div>

    <div class="footer">
      <a href="/">LinkHub Pro</a>
    </div>

  </div>
</body>
</html>
