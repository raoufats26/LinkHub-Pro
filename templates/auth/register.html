{% extends "base.html" %}
{% block title %}Create Account — LinkHub Pro{% endblock %}

{% block content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
  <div style="width:100%; max-width:420px;">

    <!-- Logo -->
    <div style="text-align:center; margin-bottom:36px;">
      <div style="font-size:44px; line-height:1; margin-bottom:10px;">⬡</div>
      <h1 style="font-size:26px; font-weight:800; letter-spacing:-.02em;">
        LinkHub <span style="color:var(--accent);">Pro</span>
      </h1>
      <p style="color:var(--text-muted); font-size:14px; margin-top:6px;">Create your free link page in seconds</p>
    </div>

    <!-- Card -->
    <div class="card" style="padding:32px;">
      <form method="POST" style="display:flex; flex-direction:column; gap:18px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div>
          <label class="label">Username</label>
          <input class="input" name="username" placeholder="yourname" required autocomplete="username">
          <div style="font-size:12px; color:var(--text-muted); margin-top:5px;">
            Your public page will be at <strong style="color:var(--accent);">linkhub.pro/yourname</strong>
          </div>
        </div>

        <div>
          <label class="label">Email</label>
          <input class="input" name="email" type="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div>
          <label class="label">Password</label>
          <input class="input" name="password" type="password" placeholder="Min 8 chars, upper + lower + number" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; padding:13px; font-size:15px; margin-top:4px;">
          Create Account →
        </button>
      </form>
    </div>

    <p style="text-align:center; font-size:13px; color:var(--text-muted); margin-top:20px;">
      Already have an account?
      <a href="/login" style="color:var(--accent); font-weight:600;">Sign in</a>
    </p>

  </div>
</div>
{% endblock %}
