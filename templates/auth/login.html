{% extends "base.html" %}
{% block title %}Sign in — LinkHub Pro{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;">

  <div class="auth-left" style="flex:1;background:#18160f;display:flex;flex-direction:column;justify-content:space-between;padding:48px;">
    <div style="font-family:'Instrument Serif',serif;font-size:22px;color:#faf9f7;letter-spacing:-.02em;">
      LinkHub<span style="color:#f97316;">.</span>
    </div>
    <div>
      <p style="font-family:'Instrument Serif',serif;font-size:30px;color:#faf9f7;line-height:1.25;letter-spacing:-.02em;margin-bottom:14px;">
        "The simplest way to<br><em style="color:#f97316;">share everything</em><br>you've made."
      </p>
      <p style="font-size:13px;color:#6b6660;">Trusted by creators worldwide</p>
    </div>
    <p style="font-size:12px;color:#3d3b37;">© 2025 LinkHub Pro</p>
  </div>

  <div style="width:460px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:48px 40px;background:var(--bg);">
    <div style="width:100%;max-width:320px;">
      <div style="margin-bottom:32px;">
        <h1 style="font-size:28px;font-weight:400;margin-bottom:5px;">Welcome back</h1>
        <p style="font-size:14px;color:var(--text-3);">Sign in to your account</p>
      </div>

      <form method="POST" style="display:flex;flex-direction:column;gap:15px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div>
          <label class="label">Email</label>
          <input class="input" name="email" type="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div>
          <label class="label">Password</label>
          <input class="input" name="password" type="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <!-- Remember me -->
        <label style="display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;color:var(--text-2);">
          <input type="checkbox" name="remember" style="width:15px;height:15px;accent-color:var(--accent);cursor:pointer;">
          Keep me signed in for 30 days
        </label>

        <button type="submit" class="btn btn-primary" style="width:100%;padding:11px;font-size:14px;margin-top:2px;">
          Sign in →
        </button>
      </form>

      <hr class="divider" style="margin:22px 0;">
      <p style="font-size:13px;color:var(--text-3);text-align:center;">
        No account? <a href="/register" style="color:var(--text);font-weight:600;">Create one free</a>
      </p>
    </div>
  </div>
</div>
<style>@media(max-width:700px){.auth-left{display:none!important}[style*="width:460px"]{width:100%!important}}</style>
{% endblock %}
